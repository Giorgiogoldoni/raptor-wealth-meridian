name: 📊 RWM ETF Universe Update

on:
  schedule:
    # Ogni sera alle 21:00 CET (20:00 UTC) — dopo chiusura mercati EU
    - cron: "0 20 * * 1-5"
  workflow_dispatch:
    # Esecuzione manuale dal tab Actions

jobs:
  fetch-etf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout raptor-wealth-meridian
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance numpy requests

      - name: Run fetch_rwm.py
        env:
          RWM_PAT: ${{ secrets.RWM_PAT }}   # PAT con write su compass
        run: python fetch_rwm.py

      - name: Summary
        run: |
          echo "## ✅ ETF Universe aggiornato" >> $GITHUB_STEP_SUMMARY
          echo "Eseguito il $(date '+%d/%m/%Y %H:%M')" >> $GITHUB_STEP_SUMMARY
